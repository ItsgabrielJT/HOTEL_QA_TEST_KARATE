name: Karate QA

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: karate-qa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      target_repo_url:
        description: Repositorio Git objetivo
        required: false
      target_repo_branch:
        description: Rama objetivo
        required: false
      qa_db_port:
        description: Puerto host para PostgreSQL
        required: false
      qa_api_port:
        description: Puerto host para la API
        required: false
      failure_issues_enabled:
        description: Crear o actualizar issue automaticamente cuando falle la suite
        required: false
  repository_dispatch:
    types: [e2e-trigger]
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches:
      - main
    paths:
      - .github/workflows/karate-qa.yml
      - .github/workflows/reusable-*.yml
      - .github/actions/**
      - scripts/**
      - qa/**
      - README.md
      - build.gradle
      - settings.gradle
      - src/test/**
      - docs/**
      - postman/**
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/karate-qa.yml
      - .github/workflows/reusable-*.yml
      - .github/actions/**
      - scripts/**
      - qa/**
      - README.md
      - build.gradle
      - settings.gradle
      - src/test/**
      - docs/**
      - postman/**

jobs:
  lint:
    name: Lint
    uses: ./.github/workflows/reusable-lint.yml

  infra:
    name: Start Infrastructure
    needs: lint
    uses: ./.github/workflows/reusable-infra.yml
    with:
      target_repo_url: ${{ inputs.target_repo_url }}
      target_repo_branch: ${{ inputs.target_repo_branch }}
      qa_db_port: ${{ inputs.qa_db_port }}
      qa_api_port: ${{ inputs.qa_api_port }}
      event_name: ${{ github.event_name }}

  karate-tests:
    name: Karate Tests
    needs: infra
    uses: ./.github/workflows/reusable-tests.yml
    with:
      target_repo_url: ${{ inputs.target_repo_url }}
      target_repo_branch: ${{ inputs.target_repo_branch }}
      qa_db_port: ${{ inputs.qa_db_port }}
      qa_api_port: ${{ inputs.qa_api_port }}

  zap-scan:
    name: OWASP ZAP Scan
    needs: infra
    uses: ./.github/workflows/reusable-security.yml
    with:
      target_repo_url: ${{ inputs.target_repo_url }}
      target_repo_branch: ${{ inputs.target_repo_branch }}
      qa_db_port: ${{ inputs.qa_db_port }}
      qa_api_port: ${{ inputs.qa_api_port }}

  publish-and-notify:
    name: Publish Report & Notify
    needs: [karate-tests, zap-scan]
    if: >-
      always() &&
      github.event_name != 'pull_request' &&
      (
        needs.karate-tests.result == 'success' || needs.karate-tests.result == 'failure' ||
        needs.zap-scan.result   == 'success' || needs.zap-scan.result   == 'failure'
      )
    uses: ./.github/workflows/reusable-publish.yml
    permissions:
      contents: read
      issues: write
      pages: write
      id-token: write
    with:
      target_repo_url: ${{ inputs.target_repo_url }}
      target_repo_branch: ${{ inputs.target_repo_branch }}
      failure_issues_enabled: ${{ inputs.failure_issues_enabled }}
      karate_result: ${{ needs.karate-tests.result }}
      zap_result: ${{ needs.zap-scan.result }}
