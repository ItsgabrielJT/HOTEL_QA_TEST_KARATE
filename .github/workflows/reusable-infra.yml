name: Reusable – Infrastructure

on:
  workflow_call:
    inputs:
      target_repo_url:
        description: Repositorio Git objetivo (sobreescribe vars.DB_QA_TARGET_REPO_URL)
        type: string
        required: false
      target_repo_branch:
        description: Rama del repositorio objetivo (sobreescribe vars.DB_QA_TARGET_REPO_BRANCH)
        type: string
        required: false
      qa_db_port:
        description: Puerto host para PostgreSQL (sobreescribe vars.DB_QA_DB_PORT)
        type: string
        required: false
      qa_api_port:
        description: Puerto host para la API (sobreescribe vars.DB_QA_API_PORT)
        type: string
        required: false
      event_name:
        description: >-
          Nombre del evento que disparó el workflow llamante. Necesario para
          que la validación de puertos solo corra en workflow_dispatch.
        type: string
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  infra:
    name: Start Infrastructure
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      COMPOSE_PROJECT_NAME: hotel-infra-${{ github.run_id }}
      TARGET_REPO_URL: ${{ inputs.target_repo_url || vars.DB_QA_TARGET_REPO_URL }}
      TARGET_REPO_BRANCH: ${{ inputs.target_repo_branch || vars.DB_QA_TARGET_REPO_BRANCH }}
      QA_DB_PORT: ${{ inputs.qa_db_port || vars.DB_QA_DB_PORT }}
      QA_API_PORT: ${{ inputs.qa_api_port || vars.DB_QA_API_PORT }}
      QA_ARTIFACTS_DIR: ${{ github.workspace }}/qa-artifacts/infra
      TARGET_CLONE_DIR: ${{ github.workspace }}/target-under-test

    steps:
      - name: Setup Node.js with npm cache
        uses: ./.github/actions/setup-node-cached

      - name: Validate workflow_dispatch inputs
        if: inputs.event_name == 'workflow_dispatch'
        run: |
          if [[ -n "$QA_API_PORT" && ! "$QA_API_PORT" =~ ^[0-9]{2,5}$ ]]; then
            echo "::error::qa_api_port debe ser un numero de puerto valido (2-5 digitos): '$QA_API_PORT'"
            exit 1
          fi
          if [[ -n "$QA_DB_PORT" && ! "$QA_DB_PORT" =~ ^[0-9]{2,5}$ ]]; then
            echo "::error::qa_db_port debe ser un numero de puerto valido (2-5 digitos): '$QA_DB_PORT'"
            exit 1
          fi

      - name: Start infrastructure (Docker + API)
        uses: ./.github/actions/run-infra

      - name: Health check
        run: |
          echo "Esperando respuesta de la API en http://127.0.0.1:${QA_API_PORT}/health ..."
          until curl --fail --silent --show-error --max-time 5 \
                "http://127.0.0.1:${QA_API_PORT}/health"; do
            sleep 3
          done
          echo "API lista y respondiendo."

      - name: Publish infra summary
        if: always()
        uses: ./.github/actions/publish-step-summary
        with:
          summary_file: qa-artifacts/infra/reports/infra-summary.md
          job_name: Infraestructura

      - name: Export infra metadata
        run: |
          mkdir -p qa-artifacts/infra/pipeline
          TARGET_COMMIT="$(git -C target-under-test rev-parse HEAD 2>/dev/null || echo unknown)"
          printf 'TARGET_COMMIT=%s\n' "${TARGET_COMMIT}" \
            > qa-artifacts/infra/pipeline/infra-meta.env
          echo "Commit validado: ${TARGET_COMMIT}"

      - name: Upload infra metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: infra-meta-${{ github.run_id }}
          path: qa-artifacts/infra/pipeline/infra-meta.env
          retention-days: 1

      - name: Teardown infrastructure
        if: always()
        uses: ./.github/actions/teardown-infra
