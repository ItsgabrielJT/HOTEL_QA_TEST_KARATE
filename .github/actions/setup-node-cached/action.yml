name: Setup Node.js with cached npm
description: |
  Configura Node.js 20 y restaura la caché npm.
  Requiere que TARGET_REPO_URL y TARGET_REPO_BRANCH estén definidas como
  variables de entorno en el job llamante (usadas como clave de caché).
  El job llamante debe haber ejecutado actions/checkout antes de invocar
  esta action.

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Cache npm dependencies
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: npm-${{ env.TARGET_REPO_URL }}-${{ env.TARGET_REPO_BRANCH }}
        restore-keys: |
          npm-${{ env.TARGET_REPO_URL }}-
